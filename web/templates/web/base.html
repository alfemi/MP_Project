{% load static %}
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Sync</title>
    <link rel="icon" type="image/x-icon" href="{% static 'web/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'web/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-banner">
        <img src="{% static 'web/logo.png' %}" alt="Stream Sync Logo" class="app-logo">
        <div id="theme-toggle" class="theme-toggle">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Mode Nit</span>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        // Check for saved theme preference
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark-mode');
            updateToggleUI(true);
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateToggleUI(isDark);
        });

        function updateToggleUI(isDark) {
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeText.textContent = isDark ? 'Mode Clar' : 'Mode Nit';
        }
    </script>
</body>
</html>
