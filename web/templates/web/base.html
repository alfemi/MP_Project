{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Sync</title>
    <link rel="icon" type="image/x-icon" href="{% static 'web/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'web/style.css' %}?v=20260415-ui2">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="app-banner">
        <div class="app-banner-inner">
            <a href="{% url 'home' %}" class="brand-link" aria-label="Ir al catálogo de StreamSync">
                <img src="{% static 'web/logo.png' %}" alt="Logo de Stream Sync" class="app-logo">
                <div class="brand-copy">
                    <span class="brand-name">StreamSync</span>
                    <span class="brand-tagline">Discovery unificado</span>
                </div>
            </a>

            <div class="header-actions">
                {% if request.session.user_id %}
                <nav class="app-nav" aria-label="Navegación principal">
                    <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' or request.resolver_match.url_name == 'content_detail' %}is-active{% endif %}">Catálogo</a>
                    <a href="{% url 'favorites' %}" class="{% if request.resolver_match.url_name == 'favorites' %}is-active{% endif %}">Favoritos</a>
                    {% if request.user.is_superuser %}
                    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}is-active{% endif %}">Dashboard</a>
                    {% elif user and user.rank == 'sysadmin' %}
                    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}is-active{% endif %}">Dashboard</a>
                    {% endif %}
                </nav>
                {% endif %}

                <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema">
                    <span id="theme-icon">🌙</span>
                    <span id="theme-text">Modo noche</span>
                </button>
            </div>
        </div>
    </header>
    <main class="container {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        // Check for saved theme preference
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark-mode');
            updateToggleUI(true);
        }

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                const isDark = body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateToggleUI(isDark);
            });
        }

        function updateToggleUI(isDark) {
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeText.textContent = isDark ? 'Modo claro' : 'Modo noche';
        }
    </script>
</body>
</html>
