{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Sync</title>
    <link rel="icon" type="image/x-icon" href="{% static 'web/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'web/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-banner">
        <a href="{% url 'home' %}" class="brand-link">
            <img src="{% static 'web/logo.png' %}" alt="Logo de Stream Sync" class="app-logo">
        </a>
        {% if request.session.user_id %}
        <nav class="app-nav">
            <a href="{% url 'home' %}">Catálogo</a>
            <a href="{% url 'favorites' %}">Favoritos</a>
            {% if request.user.is_superuser %}
            <a href="{% url 'dashboard' %}">Dashboard</a>
            {% elif user and user.rank == 'sysadmin' %}
            <a href="{% url 'dashboard' %}">Dashboard</a>
            {% endif %}
        </nav>
        {% endif %}
        <div id="theme-toggle" class="theme-toggle">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Modo Noche</span>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        // Check for saved theme preference
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark-mode');
            updateToggleUI(true);
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateToggleUI(isDark);
        });

        function updateToggleUI(isDark) {
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeText.textContent = isDark ? 'Modo Claro' : 'Modo Noche';
        }
    </script>
</body>
</html>
