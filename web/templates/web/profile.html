{% extends 'web/base.html' %}

{% block content %}
<div class="profile-container" style="max-width: 800px; margin: 2rem auto;">
    <div class="profile-header" style="text-align: center; margin-bottom: 3rem;">
        <h2 style="font-size: 2.8rem; color: var(--text-color);">Mi Perfil 👤</h2>
        <p style="color: #888;">Gestiona tu información y seguridad</p>
    </div>

    {% if success %}
        <div class="success-banner" style="background: rgba(46, 173, 92, 0.1); border-left: 5px solid #2EAD5C; padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 2rem; color: var(--text-color);">
            <strong>✨ Éxito:</strong> {{ success }}
        </div>
    {% endif %}

    {% if error %}
        <div class="error-banner">
            <span class="error-icon">⚠️</span>
            <div class="error-message">
                <strong>Error:</strong> {{ error }}
            </div>
        </div>
    {% endif %}

    <div class="profile-sections-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <!-- Sección Información Personal -->
        <div class="register-section">
            <h3><span class="section-icon">📝</span> Datos Personales</h3>
            <form method="post" class="profile-form">
                {% csrf_token %}
                <input type="hidden" name="action" value="update_info">
                
                <div class="input-group">
                    <label>Nombre de usuario</label>
                    <input type="text" value="{{ user.user_name }}" disabled style="opacity: 0.7; cursor: not-allowed;">
                </div>
                
                <div class="input-group">
                    <label>Correo electrónico</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>
                
                <div class="input-group">
                    <label>Dirección</label>
                    <input type="text" name="address" value="{{ info.address }}" required>
                </div>
                
                <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="input-group">
                        <label>Idioma</label>
                        <input type="text" name="language" value="{{ info.language }}" required>
                    </div>
                    <div class="input-group">
                        <label>Edad</label>
                        <input type="number" name="age" value="{{ info.age }}" required min="12">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Género</label>
                    <select name="sex" required>
                        <option value="male" {% if info.sex == 'male' %}selected{% endif %}>👨 Hombre</option>
                        <option value="female" {% if info.sex == 'female' %}selected{% endif %}>👩 Mujer</option>
                    </select>
                </div>
                
                <button type="submit" class="cta-button" style="margin-top: 1.5rem; width: 100%;">Actualizar Datos</button>
            </form>
        </div>

        <!-- Sección Seguridad -->
        <div class="register-section">
            <h3><span class="section-icon">🔒</span> Seguridad</h3>
            <form method="post" class="profile-form">
                {% csrf_token %}
                <input type="hidden" name="action" value="change_password">
                
                <div class="input-group">
                    <label>Contraseña actual</label>
                    <input type="password" name="old_password" placeholder="••••••••" required>
                </div>
                
                <div class="input-group">
                    <label>Nueva contraseña</label>
                    <input type="password" name="new_password" placeholder="Mínimo 8 caracteres" required>
                </div>
                
                <div class="input-group">
                    <label>Confirmar nueva contraseña</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="cta-button" style="margin-top: 1.5rem; width: 100%; background: #666;">Cambiar Contraseña</button>
            </form>

            <div class="danger-zone" style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--banner-border); text-align: center;">
                <a href="{% url 'logout' %}" class="cta-button" style="background: var(--error-color); text-decoration: none; display: inline-block; width: 100%;">Cerrar Sesión</a>
            </div>
        </div>
    </div>
</div>

<style>
    @media (max-width: 768px) {
        .profile-sections-grid {
            grid-template-columns: 1fr !important;
        }
    }
</style>
{% endblock %}
